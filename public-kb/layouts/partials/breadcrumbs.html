<nav aria-label="breadcrumb">
  <ul>
    <li><a href="/">{{ .Site.Title | default "Docs" }}</a></li>
    {{ with .Params.categories }}
      {{ range . }}
        {{ $term := . }}
        {{ with site.GetPage (printf "/categories/%s" $term) }}
          <li><a href="{{ .RelPermalink }}">{{ $term }}</a></li>
        {{ else }}
          <li>{{ $term }}</li>
        {{ end }}
      {{ end }}
    {{ end }}
  </ul>
</nav>
